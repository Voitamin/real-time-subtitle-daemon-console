<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Real-time subtitle daemon architecture</title>
  <desc id="desc">System architecture diagram for the public portfolio repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="72" y="92" fill="#f8fafc" font-size="46" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Real-time subtitle system architecture</text>
  <text x="72" y="132" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Daemon, LLM stages, runtime state, and operator console in one loop.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="210" width="230" height="140" rx="24" fill="#e0f2fe"/>
    <text x="104" y="266" fill="#0f172a" font-size="30" font-weight="700">Input source</text>
    <text x="104" y="306" fill="#334155" font-size="20">Speechmatics live ASR</text>
    <text x="104" y="334" fill="#334155" font-size="20">or file-based subtitle feed</text>
    <rect x="374" y="210" width="260" height="140" rx="24" fill="#f8fafc"/>
    <text x="406" y="266" fill="#0f172a" font-size="30" font-weight="700">Daemon core</text>
    <text x="406" y="306" fill="#475569" font-size="20">Cue ingest, queueing, deadline tracking,</text>
    <text x="406" y="334" fill="#475569" font-size="20">and adaptive scheduling pressure</text>
    <rect x="706" y="120" width="280" height="140" rx="24" fill="#fef3c7"/>
    <text x="738" y="176" fill="#0f172a" font-size="30" font-weight="700">Stage 1: correction</text>
    <text x="738" y="216" fill="#475569" font-size="20">JP normalization, cleanup,</text>
    <text x="738" y="244" fill="#475569" font-size="20">provider routing and fallback</text>
    <rect x="706" y="300" width="280" height="140" rx="24" fill="#fde68a"/>
    <text x="738" y="356" fill="#0f172a" font-size="30" font-weight="700">Stage 2: translation</text>
    <text x="738" y="396" fill="#475569" font-size="20">JP → ZH generation with glossary</text>
    <text x="738" y="424" fill="#475569" font-size="20">and terminology controls</text>
    <rect x="1058" y="210" width="270" height="140" rx="24" fill="#dcfce7"/>
    <text x="1090" y="266" fill="#0f172a" font-size="30" font-weight="700">Outputs</text>
    <text x="1090" y="306" fill="#475569" font-size="20">zh.txt / zh.srt</text>
    <text x="1090" y="334" fill="#475569" font-size="20">overlay-ready subtitle artifacts</text>
    <rect x="374" y="514" width="300" height="160" rx="24" fill="#fdf2f8"/>
    <text x="406" y="574" fill="#0f172a" font-size="30" font-weight="700">Runtime state</text>
    <text x="406" y="614" fill="#475569" font-size="20">SQLite persistence, recent cues,</text>
    <text x="406" y="642" fill="#475569" font-size="20">edits, delay offset, traceable events</text>
    <rect x="764" y="514" width="340" height="160" rx="24" fill="#e0e7ff"/>
    <text x="796" y="574" fill="#0f172a" font-size="30" font-weight="700">FastAPI console + React UI</text>
    <text x="796" y="614" fill="#475569" font-size="20">Metrics, cue list, live edits, delay control,</text>
    <text x="796" y="642" fill="#475569" font-size="20">glossary/name hot updates via browser</text>
    <path d="M302 280H344" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M634 280H676" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
    <path d="M986 280H1028" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
    <path d="M504 350V486" stroke="#f472b6" stroke-width="8" stroke-linecap="round"/>
    <path d="M894 440V486" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
    <path d="M674 594H736" stroke="#60a5fa" stroke-width="8" stroke-linecap="round"/>
    <polygon points="344,280 320,267 320,293" fill="#38bdf8"/>
    <polygon points="676,280 652,267 652,293" fill="#f59e0b"/>
    <polygon points="1028,280 1004,267 1004,293" fill="#22c55e"/>
    <polygon points="504,486 491,462 517,462" fill="#f472b6"/>
    <polygon points="894,486 881,462 907,462" fill="#a78bfa"/>
    <polygon points="736,594 712,581 712,607" fill="#60a5fa"/>
  </g>
</svg>
