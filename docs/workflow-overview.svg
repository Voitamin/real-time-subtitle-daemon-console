<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Console operator workflow</title>
  <desc id="desc">Operator workflow overview for monitoring and editing real-time subtitles.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="70" y="92" fill="#0f172a" font-size="44" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Operator workflow</text>
  <text x="70" y="130" fill="#475569" font-size="22" font-family="Segoe UI, Arial, sans-serif">How the live console fits into the subtitle loop during a stream.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="210" width="240" height="130" rx="24" fill="#0f172a"/>
    <text x="104" y="268" fill="#f8fafc" font-size="28" font-weight="700">1. Watch status</text>
    <text x="104" y="306" fill="#cbd5e1" font-size="20">Queue pressure, deadlines, and</text>
    <text x="104" y="332" fill="#cbd5e1" font-size="20">stream health via SSE updates</text>
    <rect x="372" y="210" width="240" height="130" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="404" y="268" fill="#0f172a" font-size="28" font-weight="700">2. Inspect cues</text>
    <text x="404" y="306" fill="#475569" font-size="20">Find the active source_key,</text>
    <text x="404" y="332" fill="#475569" font-size="20">review drafts and revisions</text>
    <rect x="672" y="210" width="240" height="130" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="704" y="268" fill="#0f172a" font-size="28" font-weight="700">3. Edit or delay</text>
    <text x="704" y="306" fill="#475569" font-size="20">Patch cue text, adjust delay,</text>
    <text x="704" y="332" fill="#475569" font-size="20">jump to latest, flush pending</text>
    <rect x="972" y="210" width="240" height="130" rx="24" fill="#dcfce7"/>
    <text x="1004" y="268" fill="#0f172a" font-size="28" font-weight="700">4. Ship output</text>
    <text x="1004" y="306" fill="#475569" font-size="20">Overlay files stay aligned</text>
    <text x="1004" y="332" fill="#475569" font-size="20">for OBS and downstream tools</text>
    <rect x="248" y="446" width="320" height="170" rx="24" fill="#fef3c7"/>
    <text x="282" y="508" fill="#0f172a" font-size="30" font-weight="700">Terminology hot updates</text>
    <text x="282" y="548" fill="#475569" font-size="20">Glossary and whitelist edits propagate</text>
    <text x="282" y="576" fill="#475569" font-size="20">without bouncing the whole runtime.</text>
    <rect x="706" y="446" width="330" height="170" rx="24" fill="#e0e7ff"/>
    <text x="740" y="508" fill="#0f172a" font-size="30" font-weight="700">Traceable state</text>
    <text x="740" y="548" fill="#475569" font-size="20">Each action lands in persistent runtime state,</text>
    <text x="740" y="576" fill="#475569" font-size="20">making debugging and replay practical.</text>
    <path d="M312 274H356" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M612 274H656" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M912 274H956" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M792 340V418" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
    <path d="M408 340V418" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
    <polygon points="356,274 332,261 332,287" fill="#38bdf8"/>
    <polygon points="656,274 632,261 632,287" fill="#38bdf8"/>
    <polygon points="956,274 932,261 932,287" fill="#38bdf8"/>
    <polygon points="792,418 779,394 805,394" fill="#a78bfa"/>
    <polygon points="408,418 395,394 421,394" fill="#f59e0b"/>
  </g>
</svg>
